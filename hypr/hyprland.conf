monitor = ,preferred,auto,1

$terminal = kitty
$fileManager = yazi
$browser = zen-browser

exec-once = nm-applet --indicator & waybar
exec-once = walker --gaplication-service
exec-once = elephant

env = GTK_THEME,Adwaita:dark
env = GTK2_RC_FILES,/usr/share/themes/Adwaita-dark/gtk-2.0/gtkrc
env = AMD_VULKAN_ICD,RADV
env = RADV_PERFTEST,aco

general {
  	gaps_in = 6
	gaps_out = 6

	border_size = 1
	resize_on_border = true

	layout = dwindle
}

decoration {
	rounding = 10
	rounding_power = 2

	active_opacity = 3.0
	inactive_opacity = 0.90

	shadow {
	   enabled = true
	   range = 4
	   render_power = 3
	   color = rgba(1a1a1aee)
	}

	blur {
	   enabled = true
	   size = 3
	   passes = 1
	   vibrancy = 0.1696
	}
}

animations {
	enabled = yes

	bezier = easeOutQuint,   0.23, 1,    0.32, 1
	bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
	bezier = linear,         0,    0,    1,    1
	bezier = almostLinear,   0.5,  0.5,  0.1,  1
	bezier = quick,     	 0.15, 0,    0.1,  1
	bezier = fluent_decel, 0, 0.55, 0.45, 1

	animation = global,        1, 10,   default
	animation = border,        0, 1,    default
	animation = windows,       1, 5,    fluent_decel
	animation = windowsIn,     1, 5,    fluent_decel, slide
	animation = windowsOut,    1, 5,    fluent_decel, slide
	animation = windowsMove,   1, 5,    fluent_decel
	animation = fadeIn,        1, 1.73, almostLinear
	animation = fadeOut,       1, 1.46, almostLinear
	animation = fade,          1, 3.03, quick
	animation = layers,        1, 3.81, easeOutQuint
	animation = layersIn,      1, 4,    easeOutQuint, fade
	animation = layersOut,     1, 1.5,  linear,       fade
	animation = fadeLayersIn,  1, 1.79, almostLinear
	animation = fadeLayersOut, 1, 1.39, almostLinear
	animation = workspaces,    1, 1.94, almostLinear, fade
	animation = workspacesIn,  1, 1.21, almostLinear, fade
	animation = workspacesOut, 1, 1.94, almostLinear, fade
	animation = zoomFactor,    1, 7,    quick
}

dwindle {
	pseudotile = true
	preserve_split = true
	force_split = 2
}

master {
	new_status = master
}

misc {
	force_default_wallpaper = -1
	disable_hyprland_logo = false
	animate_manual_resizes = false
}

input {
	kb_layout = us
	follow_mouse = 1
	sensitivity = 0
	touchpad {
	    natural_scroll = true
	}
}

gesture = 3, horizontal, workspace

device {
	name = yichip-wireless-device-mouse
	sensitivity = 0.0
}

$mainMod = SUPER

bind = $mainMod, B, exec, $browser
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyrctl dispatch exit
bind = $mainMod, E, exec, $terminal -e $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, walker
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit

# move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# special workspace scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, s, movetoworkspace, special:magic

# move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# laptop multimedia
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule {
	name = supress-maximize-events
	match:class = .*
	suppress_event = maximize
}

windowrule {
	name = fix-xwayland-drags

	match:class = ^$
	match:title = ^$
	match:xwayland = true
	match:float = true
	match:fullscreen  = false
	match:pin = false

	no_focus = true
}

windowrule {
	name = move-hyprland-run

	match:class = hyprland-run
	
	move = 20 monitor_h-120
	float = yes
}
