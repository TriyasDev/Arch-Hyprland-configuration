[manager]
keymap = [
	# Navigasi Dasar (Vim-style)
	{ on = [ "k" ], run = "arrow -1", desc = "Pindah ke atas" },
	{ on = [ "j" ], run = "arrow 1",  desc = "Pindah ke bawah" },
	{ on = [ "h" ], run = "leave",    desc = "Kembali ke folder induk" },
	{ on = [ "l" ], run = "enter",    desc = "Masuk ke folder atau buka file" },

	# Navigasi Cepat & Scrolling
	{ on = [ "K" ], run = "peek -5", desc = "Scroll preview ke atas" },
	{ on = [ "J" ], run = "peek 5",  desc = "Scroll preview ke bawah" },
	{ on = [ "<C-u>" ], run = "arrow -50%", desc = "Lompat setengah halaman ke atas" },
	{ on = [ "<C-d>" ], run = "arrow 50%",  desc = "Lompat setengah halaman ke bawah" },

	# Operasi File
	{ on = [ "y" ], run = "copy",             desc = "Salin file (Yank)" },
	{ on = [ "x" ], run = "cut",              desc = "Potong file" },
	{ on = [ "p" ], run = "paste",            desc = "Tempel file" },
	{ on = [ "r" ], run = "rename --cursor=before_ext", desc = "Ubah nama" },
	{ on = [ "d" ], run = "remove",           desc = "Hapus ke trash" },
	{ on = [ "D" ], run = "remove --permanently", desc = "Hapus permanen" },

	# Pencarian & Lompat Folder
	{ on = [ "f" ], run = "filter --smart", desc = "Filter cepat" },
	{ on = [ "s" ], run = "search fd",       desc = "Cari dengan fd" },
	{ on = [ "z" ], run = "plugin zoxide",   desc = "Lompat folder (Zoxide)" },

	# Tampilan & Seleksi
	{ on = [ "H" ], run = "hidden toggle", desc = "Toggle file tersembunyi" },
	{ on = [ "v" ], run = "visual_mode",    desc = "Mode visual (seleksi)" },

	# Management Tab
	{ on = [ "t" ], run = "tab_create --current", desc = "Tab baru" },
	{ on = [ "w" ], run = "tab_close",             desc = "Tutup tab" },
	{ on = [ "[" ], run = "tab_switch -1",        desc = "Tab kiri" },
	{ on = [ "]" ], run = "tab_switch 1",         desc = "Tab kanan" },

	# Eksekusi Aplikasi
	{ on = [ "Enter" ], run = "open", desc = "Buka default" },
	{ on = [ "e" ],     run = "edit", desc = "Edit di Neovim" }
]
